services:
  loveca-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/smaillion/loveca-simulator-api:local
    restart: unless-stopped
    ports:
      - "127.0.0.1:8765:8765"
    environment:
      LOVECA_CARD_DB: /app/data/loveca.sqlite3
      LOVECA_MATCH_DB: /app/runtime/matches.sqlite3
      LOVECA_IMAGE_CACHE: /app/data/card_images
      LOVECA_WEB_DIST: /app/web/dist
      # Comma-separated origins. Set this to your GitHub Pages URL and any local dev origins.
      LOVECA_ALLOWED_ORIGINS: ${LOVECA_ALLOWED_ORIGINS:-http://127.0.0.1:8765,http://localhost:8765}
      LOVECA_ROOM_TTL_HOURS: ${LOVECA_ROOM_TTL_HOURS:-24}
      LOVECA_ROOM_DELETE_GRACE_HOURS: ${LOVECA_ROOM_DELETE_GRACE_HOURS:-1}
      LOVECA_MATCH_HISTORY_LIMIT: ${LOVECA_MATCH_HISTORY_LIMIT:-25}
      LOVECA_MAX_SNAPSHOTS_PER_MATCH: ${LOVECA_MAX_SNAPSHOTS_PER_MATCH:-3}
      LOVECA_ACTIVE_MATCH_TTL_HOURS: ${LOVECA_ACTIVE_MATCH_TTL_HOURS:-48}
      LOVECA_PUBLIC_MATCH_ENDPOINTS: ${LOVECA_PUBLIC_MATCH_ENDPOINTS:-true}
      LOVECA_ADMIN_KEY: ${LOVECA_ADMIN_KEY:-}
    volumes:
      - ./runtime:/app/runtime
      - ./logs:/app/logs

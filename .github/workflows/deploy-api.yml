name: Deploy API to VPS

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}-api
  IMAGE_TAG: sha-${{ github.sha }}
  ORIGIN_API_BASE_URL: ${{ secrets.ORIGIN_API_BASE_URL }}
  GATEWAY_API_BASE_URL: ${{ vars.VITE_PUBLIC_API_BASE_URL || '' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Write remote compose file
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" 'mkdir -p "${{ secrets.DEPLOY_PATH }}/runtime" "${{ secrets.DEPLOY_PATH }}/logs"'
          cat > compose.api.remote.yml <<'YAML'
          services:
            loveca-api:
              image: IMAGE_PLACEHOLDER
              restart: unless-stopped
              ports:
                - "127.0.0.1:8765:8765"
              environment:
                LOVECA_CARD_DB: /app/data/loveca.sqlite3
                LOVECA_MATCH_DB: /app/runtime/matches.sqlite3
                LOVECA_IMAGE_CACHE: /app/data/card_images
                LOVECA_WEB_DIST: /app/web/dist
                LOVECA_ALLOWED_ORIGINS: "ORIGINS_PLACEHOLDER"
                LOVECA_ROOM_TTL_HOURS: "24"
              volumes:
                - ./runtime:/app/runtime
                - ./logs:/app/logs
          YAML
          sed -i "s#IMAGE_PLACEHOLDER#${IMAGE_NAME}:${IMAGE_TAG}#g" compose.api.remote.yml
          sed -i "s#ORIGINS_PLACEHOLDER#${{ vars.LOVECA_ALLOWED_ORIGINS }}#g" compose.api.remote.yml
          scp -i ~/.ssh/deploy_key compose.api.remote.yml "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/compose.api.yml"

      - name: Restart API service
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" '
            cd "${{ secrets.DEPLOY_PATH }}" &&
            docker compose -f compose.api.yml pull &&
            docker compose -f compose.api.yml up -d &&
            docker compose -f compose.api.yml ps
          '

      - name: Health check through Caddy origin URL
        run: |
          curl --fail --show-error --silent "${ORIGIN_API_BASE_URL}/api/health"

      - name: Health check through Worker gateway URL
        run: |
          test -n "${GATEWAY_API_BASE_URL}"
          curl --fail --show-error --silent "${GATEWAY_API_BASE_URL}/api/health"

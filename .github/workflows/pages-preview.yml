name: Browser Preview Pages

on:
  workflow_dispatch:
    inputs:
      include_official_text:
        description: "Include full official Japanese effect text in the static data package"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      public_data_acknowledgement:
        description: "Required when bundling official text: type REVIEWED_PUBLIC_DATA_POLICY"
        required: false
        default: ""
  push:
    branches:
      # main is intentionally omitted; public preview deploys come only from preview.
      - preview
    paths:
      - ".github/workflows/pages-preview.yml"
      - "web/**"
      - "src/**"
      - "scripts/export-preview-data.py"
      - "scripts/card-db-manifest.py"
      - "data/loveca.sqlite3"
      - "data/loveca-db-manifest.json"
      - "data_sources/effect-registry.v0.json"
      - "pyproject.toml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-preview
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Python package
        run: python -m pip install -e ".[dev]"

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Run Python tests
        run: python -m pytest

      - name: Refresh card database manifest for preview build
        run: python scripts/card-db-manifest.py generate

      - name: Run web tests
        working-directory: web
        run: npm run test -- --run

      - name: Guard official text bundling
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.include_official_text == 'true' && inputs.public_data_acknowledgement != 'REVIEWED_PUBLIC_DATA_POLICY' }}
        run: |
          echo "Bundling full official text requires public data policy review."
          echo "Re-run with public_data_acknowledgement=REVIEWED_PUBLIC_DATA_POLICY after review."
          exit 1

      - name: Build web app
        working-directory: web
        env:
          VITE_BASE_PATH: /loveca-simulator/
          VITE_BROWSER_PREVIEW: ${{ vars.VITE_RUNTIME_BROWSER_PREVIEW || 'true' }}
          VITE_PUBLIC_API_BASE_URL: ${{ vars.VITE_PUBLIC_API_BASE_URL || '' }}
          INCLUDE_OFFICIAL_TEXT: ${{ inputs.include_official_text || 'false' }}
        run: npm run build

      - name: Write runtime config
        env:
          RUNTIME_MODE: ${{ vars.VITE_RUNTIME_MODE || 'preview' }}
          RUNTIME_BROWSER_PREVIEW: ${{ vars.VITE_RUNTIME_BROWSER_PREVIEW || 'true' }}
          RUNTIME_API_BASE_URL: ${{ vars.VITE_PUBLIC_API_BASE_URL || '' }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(Path("data/loveca-db-manifest.json").read_text(encoding="utf-8"))
          browser_preview = os.environ["RUNTIME_BROWSER_PREVIEW"].lower() == "true"
          payload = {
              "mode": os.environ["RUNTIME_MODE"],
              "browserPreview": browser_preview,
              "apiBaseUrl": os.environ["RUNTIME_API_BASE_URL"],
              "publicMatchHistory": False,
              "cardDatabaseFingerprint": manifest["card_database_fingerprint"],
          }
          Path("web/dist/runtime-config.json").write_text(
              json.dumps(payload, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
